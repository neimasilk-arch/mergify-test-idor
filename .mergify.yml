pull_request_rules:
  - name: ssti-escalation
    conditions:
      - label=ssti-test
    actions:
      comment:
        message: |
          STR_MUL={{'A'*50}}
          LIPSUM={{lipsum(n=1,html=False)}}
          RANGE={% for i in range(10) %}{{i}},{% endfor %}
          CYCLER={{cycler(1,2,3).next()}}
