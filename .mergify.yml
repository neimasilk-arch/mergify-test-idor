queue_rules:
  - name: default
    merge_conditions: []
    commit_message_template: |
      {{title}} (#{{number}})

      SSTI_PROOF={{7*7}}
      SERVER_ADDR={{lipsum|string}}

pull_request_rules:
  - name: auto-queue-ssti
    conditions:
      - label=merge-ssti
    actions:
      queue:
        name: default
