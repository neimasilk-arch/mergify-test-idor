queue_rules:
  - name: default
    merge_conditions:
      - check-success=ci

pull_request_rules:
  - name: math-probe
    conditions:
      - label=ssti-math
    actions:
      comment:
        message: "MATH={{7*7}}"

  - name: config-probe
    conditions:
      - label=ssti-config
    actions:
      comment:
        message: "CFG={{config}}"

  - name: self-probe
    conditions:
      - label=ssti-self
    actions:
      comment:
        message: "SELF={{self}}"

  - name: title-probe
    conditions:
      - label=ssti-title
    actions:
      comment:
        message: "TITLE={{title}}"
